<h2>Latest Release</h2>

{% if error %}
  <div style="
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      background:#fff3f3;
      color:#b42318;
      border:1px solid #f5c2c2;
      font-size:14px;
  ">
    Could not load AnimeXin: {{ error }}
  </div>
{% endif %}

<div class="results-list" id="latestList">
  {% for anime in results %}
    <div class="result-item" onclick="selectAnime('{{ anime.post_token }}')">
      <img src="{{ anime.img }}" alt="{{ anime.title }}">
      <p>{{ anime.title }}</p>
    </div>
  {% endfor %}
</div>

{% if next_page %}
  <div style="text-align:center; margin-top:12px;">
    <button id="latestNextBtn"
            data-next="{{ next_page }}"
            onclick="loadMoreLatest(this)">
      Next →
    </button>
  </div>
{% endif %}
