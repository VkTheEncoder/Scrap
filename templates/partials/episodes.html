<h2>{{ title }}</h2>
<p>Found {{ eps|length }} episodes available.</p>

<div style="margin-top:10px;">
  <input
    type="number"
    id="ep_number"
    placeholder="Enter episode number (1-{{ eps|length }})"
    style="padding:8px; border-radius:6px; border:1px solid #ccc; width:220px;"
  >
  <button
    type="button"
    onclick="processEpisodeByNumber()"
    style="padding:8px 15px; background:#6c63ff; color:white; border:none; border-radius:6px; cursor:pointer;"
    onmouseover="this.style.background='#574fd6'"
    onmouseout="this.style.background='#6c63ff'"
  >
    ▶ Process Selected
  </button>
</div>

<div class="episode-list" style="margin-top:20px;">
  {% if eps %}
    {% for ep in eps %}
      <button
        type="button"
        class="ep-btn"
        data-num="{{ ep.num }}"
        data-token="{{ ep.episode_token }}"
        onclick='selectEpisode({{ ep.episode_token|tojson }})'
        style="
          display:inline-block;
          margin:5px;
          padding:10px 15px;
          background:#6c63ff;
          color:white;
          border:none;
          border-radius:8px;
          cursor:pointer;
          font-size:14px;
        "
        onmouseover="this.style.background='#574fd6'"
        onmouseout="this.style.background='#6c63ff'"
      >
        {% if ep.button_name %}{{ ep.button_name }}{% else %}{{ title }} Ep-{{ ep.num }}{% endif %}
      </button>
    {% endfor %}
  {% else %}
    <p>No episodes found for this anime.</p>
  {% endif %}
</div>

<script>
  function processEpisodeByNumber() {
    const input = document.getElementById("ep_number");
    const episodeNumber = input.value.trim();

    if (!episodeNumber) {
      alert("Enter an episode number");
      return;
    }

    const button = document.querySelector(`.ep-btn[data-num="${episodeNumber}"]`);

    if (!button) {
      alert("Invalid episode number");
      return;
    }

    selectEpisode(button.dataset.token);
  }
</script>
